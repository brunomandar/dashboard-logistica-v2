<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Projetos</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js" defer></script>

</head>

<body>

<div class="layout-dashboard">

    <!-- BARRA LATERAL -->

    <div class="sidebar">

        <div>

            <div class="logo-claro">
                <img src="imagens/claro_logo.png"  alt="Logo-claro">
            </div>

            <div class="texto-sidebar">
                SUPORTE OPERACIONAL E<br>
                MELHORIA CONTÍNUA
            </div>

            <button class="btn-lateral" onclick="history.back()">
                VOLTAR
            </button>

            
            <button 
                type="button"
                class="btn-base-dados"
                onclick="window.open('https://corpclarobr.sharepoint.com/:x:/r/sites/USER-_PortfoliodeprojetosLogsticos/Documentos%20Compartilhados/Base%20-%20Projetos%20Logistica%202026.xlsx?d=w71f8f9584b82455bbd00b91c7debe9de&csf=1&web=1&e=2z8OcF', '_blank')"
            >
                BASE DE DADOS
            </button>

            <button 
                type="button"
                class="btn-reuniao-estrategica"
                onclick="window.open('https://corpclarobr.sharepoint.com/:p:/r/sites/USER-_PortfoliodeprojetosLogsticos/Documentos%20Compartilhados/Demanda%20Transporte%2020260622.pptx?d=w0ae054be2c3445e2b27e257a1b1d118d&csf=1&web=1&e=aP2vbe', '_blank')"
            >
                ONE PAGE - RE
            </button>

        </div>

        <div class="icone-logistica">
            <img src="imagens/caminhao.png"  alt="icone-logistica">
        </div>

    </div>

    <!-- CONTEÚDO -->

    <div class="conteudo-dashboard">

    
    <div class="dashboard-canvas" data-base-width="1050" data-base-height="600">

        <div>

        <div class="titulo-dashboard">
         DASHBOARD - DEMANDAS
        </div>
    </div>

        <div class="miolo-dashboard">

<div class="container-topo-acoes">
    
    <div class="linha-filtros">
        <div class="item-filtro">
            <span>Gerente:</span>
            <select id="filtroGerente">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="item-filtro">
            <span>Fórum:</span>
            <select id="filtroForum">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="item-filtro">
            <span>Status:</span>
            <select id="filtroStatus">
                <option value="">Todos</option>
            </select>
        </div>
    </div>
</div>

<!-- ÁREA PRINCIPAL: CARDS + GRÁFICOS -->
<div class="area-resumo-demandas">

    <!-- CARDS EMPILHADOS -->
    <div class="cards-demandas-vertical">

        <div class="card card-demanda total" onclick="filtrarCardProjeto('TOTAL')">
            <h2>Total</h2>
            <span class="icone-card">Σ</span>
            <p id="total">0</p>
        </div>

        <div class="card card-demanda prazo" onclick="filtrarCardProjeto('NO PRAZO')">
            <h2>No Prazo</h2>
            <span class="icone-card">✓</span>
            <p id="prazo">0</p>
        </div>

        <div class="card card-demanda atencao" onclick="filtrarCardProjeto('ATENÇÃO')">
            <h2>Atenção</h2>
            <span class="icone-card">!</span>
            <p id="atencao">0</p>
        </div>

        <div class="card card-demanda atrasado" onclick="filtrarCardProjeto('ATRASADO')">
            <h2>Atrasado</h2>
            <span class="icone-card">X</span>
            <p id="atrasado">0</p>
        </div>

        <div class="card card-demanda cancelado" onclick="filtrarCardProjeto('CANCELADO')">
            <h2>Cancelado</h2>     
            <span class="icone-card">⊘</span>
            <p id="cancelado">0</p>
        </div>

        <div class="card card-demanda concluido" onclick="filtrarCardProjeto('CONCLUIDO')">
            <h2>Concluído</h2>
            <span class="icone-card">★</span>
            <p id="concluido">0</p>
        </div>

    </div>

    <!-- GRÁFICOS -->
    <div class="graficos-demandas">

        <div class="grafico-box">
            <canvas id="graficoGerenciaForum"></canvas>
        </div>

        <div class="grafico-box grafico-donut-menor">
            <canvas id="graficoPrioridade"></canvas>
        </div>

    </div>

</div>


<!-- TABELA -->
<div class="tabela-container">
<h2>Lista de Demandas</h2>

<table id="tabelaProjetos">
<thead>
<tr>
<th>ID</th>
<th>Demanda</th>
<th>Gerente</th>
<th>Fórum</th>
<th>Status Geral</th>
<th>Status</th>
<th>Prioridade</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
