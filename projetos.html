<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Projetos</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>📊 DASHBOARD EXECUTIVO - DEMANDAS</h1>

<div class="container-topo-acoes">
    <!-- Linha 1: Botão bonitão de voltar acima -->
    <button type="button" class="btn-voltar" onclick="history.back()">⬅ Voltar</button>

    <!-- Linha 2: Filtros lado a lado abaixo -->
    <div class="linha-filtros">
        <div class="item-filtro">
            <span>Gerente:</span>
            <select id="filtroGerente">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="item-filtro">
            <span>Fórum:</span>
            <select id="filtroForum">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="item-filtro">
            <span>Status:</span>
            <select id="filtroStatus">
                <option value="">Todos</option>
            </select>
        </div>
    </div>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card total" onclick="filtrarCardProjeto('TOTAL')">
<h2>Total</h2>
<p id="total">0</p>
</div>

<div class="card atrasado" onclick="filtrarCardProjeto('ATRASADO')">
<h2>Atrasados</h2>
<p id="atrasado">0</p>
</div>

<div class="card atencao" onclick="filtrarCardProjeto('ATENÇÃO')">
<h2>Atenção</h2>
<p id="atencao">0</p>
</div>

<div class="card prazo" onclick="filtrarCardProjeto('NO PRAZO')">
<h2>No Prazo</h2>
<p id="prazo">0</p>
</div>

<div class="card planejado" onclick="filtrarCardProjeto('PLANEJADO')">
<h2>Planejado</h2>
<p id="planejado">0</p>
</div>

<div class="card execucao" onclick="filtrarCardProjeto('EXECUÇÃO')">
<h2>Em Execução</h2>
<p id="em_execucao">0</p>
</div>

<div class="card backlog" onclick="filtrarCardProjeto('BACKLOG')">
<h2>Backlog</h2>
<p id="backlog">0</p>
</div>

<div class="card prioridade alta" onclick="filtrarCardProjeto('ALTA')">
    <h2>Prioridade Alta</h2>
    <p id="prioridade_alta_card">0</p>
</div>

</div>

<!-- GRÁFICOS -->
<div class="bloco-graficos">
    <!-- Caixa do Gráfico Donut -->
    <div class="grafico-box">
        <canvas id="graficoPrioridade"></canvas>
    </div>

    <!-- Caixa do Gráfico de Barras (Onde ocorre o erro da imagem) -->
    <div class="grafico-box">
        <canvas id="graficoGerenciaForum"></canvas>
    </div>
</div>


<!-- TABELA -->
<div class="tabela-container">
<h2>Lista de Demandas</h2>

<table id="tabelaProjetos">
<thead>
<tr>
<th>ID</th>
<th>Demanda</th>
<th>Gerente</th>
<th>Fórum</th>
<th>Status Geral</th>
<th>Status</th>
<th>Prioridade</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
