<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dashboard Ações</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
</head>

<body>

<div class="layout-dashboard">

    <!-- BARRA LATERAL -->
    <div class="sidebar">

        <div>
            <div class="logo-claro">
                <img src="imagens/claro_logo.png"  alt="Logo-claro">
            </div>

            <div class="texto-sidebar">
                SUPORTE OPERACIONAL E<br>
                MELHORIA CONTÍNUA
            </div>

            <button class="btn-lateral" onclick="history.back()">
                VOLTAR
            </button>
        </div>

        <div class="icone-logistica">
            <img src="imagens/caminhao.png"  alt="icone-logistica">
        </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo-dashboard">

        <div class="titulo-dashboard">
            DASHBOARD - AÇÕES
        </div>

        <!-- FILTROS -->
        <div class="container-topo-acoes-painel">

            <div class="linha-filtros-acoes">
                <div class="item-filtro">
                    <span>Gerente:</span>
                    <select id="filtroGerenteAcoes">
                        <option value="">Todos</option>
                    </select>
                </div>

                <div class="item-filtro">
                    <span>Fórum:</span>
                    <select id="filtroForumAcoes">
                        <option value="">Todos</option>
                    </select>
                </div>

                <div class="item-filtro">
                    <span>Status:</span>
                    <select id="filtroStatusAcoes">
                       <option value="">Todos</option>
                    </select>
                 </div>
            </div>

        </div>

        <!-- ÁREA PRINCIPAL: CARDS + GRÁFICO -->
        <div class="area-resumo-acoes">

            <!-- CARDS EMPILHADOS -->
            <div class="cards-acoes-vertical">

                <div class="card card-acao" onclick="filtrarCardAcao('TOTAL')">
                    <h2>Total</h2>
                    <p id="total_acoes">0</p>
                </div>

                <div class="card card-acao" onclick="filtrarCardAcao('NO PRAZO')">
                    <h2>No Prazo</h2>
                    <p id="acoes_no_prazo">0</p>
                </div>

                <div class="card card-acao" onclick="filtrarCardAcao('ATENCAO')">
                    <h2>Atenção</h2>
                    <p id="acoes_atencao">0</p>
                </div>

                <div class="card card-acao" onclick="filtrarCardAcao('ATRASADO')">
                    <h2>Atrasado</h2>
                    <p id="acoes_atrasadas">0</p>
                </div>

                <div class="card card-acao" onclick="filtrarCardAcao('SEM_ACAO')">
                    <h2>Sem Ação</h2>
                    <p id="acoes_sem_acao">0</p>
                </div>

            </div>

            <!-- GRÁFICO -->
            <div class="grafico-acoes-layout">
                <canvas id="graficoAcoes"></canvas>
            </div>

        </div>

        <!-- TABELA -->
        <div class="tabela-container tabela-acoes-layout">

            <h2>Lista de Ações</h2>

            <table id="tabelaAcoes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Demanda</th>
                        <th>Status Ação</th>
                        <th>Ações</th>
                        <th>Prazo da Ação</th>
                        <th>Responsável</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>

    </div>

</div>

</body>
</html>
